# =============================  Azure Container Registry (ACR) version of the workflow   =============================
name: WalletPulse CI/CD

on:
  push:
    branches: [ main ]

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: |
        az acr login --name ${{ secrets.ACR_NAME }}

    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/walletpulse-backend:${{ github.sha }} ./backend

    - name: Build Frontend Image
      run: |
        docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/walletpulse-frontend:${{ github.sha }} ./frontend

    - name: Push Backend Image
      run: |
        docker push ${{ secrets.ACR_NAME }}.azurecr.io/walletpulse-backend:${{ github.sha }}

    - name: Push Frontend Image
      run: |
        docker push ${{ secrets.ACR_NAME }}.azurecr.io/walletpulse-frontend:${{ github.sha }}

    - name: Set AKS Context
      run: |
        az aks get-credentials \
        --resource-group ${{ secrets.RESOURCE_GROUP }} \
        --name ${{ secrets.AKS_CLUSTER }} \
        --overwrite-existing

    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/walletpulse-backend backend=${{ secrets.ACR_NAME }}.azurecr.io/walletpulse-backend:${{ github.sha }}
        kubectl set image deployment/walletpulse-frontend frontend=${{ secrets.ACR_NAME }}.azurecr.io/walletpulse-frontend:${{ github.sha }}