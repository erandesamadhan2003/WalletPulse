version: "3.9"

services:
  backend:
    build: ./backend
    image: YOUR_DOCKER_USERNAME/walletpulse-backend
    container_name: walletpulse-backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    image: YOUR_DOCKER_USERNAME/walletpulse-frontend
    container_name: walletpulse-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend